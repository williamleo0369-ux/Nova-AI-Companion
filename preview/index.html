<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova AI Companion - 交互体验</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f1117 0%, #1a1b2e 100%);
            min-height: 100vh;
            color: #e1e4ed;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(22, 24, 34, 0.8);
            border-radius: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(124, 106, 239, 0.3);
        }

        .header .logo {
            font-size: 60px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #7c6aef, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .tagline {
            color: #8b8fa3;
            margin-top: 8px;
            font-size: 16px;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            background: rgba(22, 24, 34, 0.9);
            border-radius: 20px;
            border: 1px solid rgba(124, 106, 239, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .chat-header {
            background: rgba(28, 31, 46, 0.9);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(124, 106, 239, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .status-dot {
            width: 12px;
            height: 12px;
            background: #34d399;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-header span {
            color: #8b8fa3;
            font-size: 14px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            max-height: 500px;
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.nova .message-avatar {
            background: linear-gradient(135deg, #f472b6, #7c6aef);
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #38bdf8, #7c6aef);
        }

        .message-content {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 15px;
        }

        .message.nova .message-content {
            background: rgba(28, 31, 46, 0.9);
            border: 1px solid rgba(124, 106, 239, 0.2);
            border-radius: 4px 16px 16px 16px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, rgba(124, 106, 239, 0.8), rgba(56, 189, 248, 0.8));
            border-radius: 16px 4px 16px 16px;
        }

        .message-time {
            font-size: 11px;
            color: #8b8fa3;
            margin-top: 4px;
            padding: 0 4px;
        }

        .message.user .message-time {
            text-align: right;
        }

        /* Emotion indicator */
        .emotion-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(124, 106, 239, 0.2);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .emotion-indicator span {
            font-size: 14px;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 14px 18px;
            background: rgba(28, 31, 46, 0.9);
            border-radius: 16px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #8b8fa3;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: rgba(28, 31, 46, 0.9);
            border-top: 1px solid rgba(124, 106, 239, 0.2);
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(15, 17, 23, 0.8);
            border: 1px solid rgba(124, 106, 239, 0.3);
            border-radius: 12px;
            color: #e1e4ed;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            border-color: #7c6aef;
            box-shadow: 0 0 0 3px rgba(124, 106, 239, 0.2);
        }

        .input-wrapper input::placeholder {
            color: #8b8fa3;
        }

        .send-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #7c6aef, #38bdf8);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(124, 106, 239, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 6px 14px;
            background: rgba(124, 106, 239, 0.15);
            border: 1px solid rgba(124, 106, 239, 0.3);
            border-radius: 20px;
            color: #8b8fa3;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quick-btn:hover {
            background: rgba(124, 106, 239, 0.3);
            color: #e1e4ed;
        }

        /* Memory Panel */
        .memory-panel {
            background: rgba(22, 24, 34, 0.9);
            border-radius: 20px;
            border: 1px solid rgba(124, 106, 239, 0.2);
            padding: 20px;
            margin-bottom: 20px;
        }

        .memory-panel h3 {
            color: #fff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .memory-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            background: rgba(15, 17, 23, 0.5);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .memory-type {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .memory-type.fact { background: rgba(56, 189, 248, 0.2); color: #38bdf8; }
        .memory-type.emotion { background: rgba(52, 211, 153, 0.2); color: #34d399; }
        .memory-type.preference { background: rgba(251, 146, 60, 0.2); color: #fb923c; }

        .memory-content {
            flex: 1;
            font-size: 14px;
            color: #c8cad8;
        }

        .memory-time {
            font-size: 12px;
            color: #8b8fa3;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(22, 24, 34, 0.8);
            border-radius: 12px;
            font-size: 13px;
            color: #8b8fa3;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-item .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-item .dot.green { background: #34d399; }
        .status-item .dot.yellow { background: #fbbf24; }
        .status-item .dot.blue { background: #38bdf8; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(124, 106, 239, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .header { padding: 20px 15px; }
            .header h1 { font-size: 24px; }
            .message-content { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">🌟</div>
            <h1>Nova AI Companion</h1>
            <p class="tagline">有记忆 · 有情感 · 有温度</p>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <div class="dot green"></div>
                <span>在线</span>
            </div>
            <div class="status-item">
                <div class="dot blue"></div>
                <span id="memory-count">0 条记忆</span>
            </div>
            <div class="status-item">
                <div class="dot yellow"></div>
                <span id="emotion-state">心情: 温和</span>
            </div>
        </div>

        <!-- Memory Panel -->
        <div class="memory-panel">
            <h3>🧠 Nova 记住的信息</h3>
            <div id="memory-list">
                <div class="memory-item">
                    <span class="memory-type fact">fact</span>
                    <div>
                        <div class="memory-content">用户还没有开始对话</div>
                        <div class="memory-time">等待中...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Container -->
        <div class="chat-container">
            <div class="chat-header">
                <div class="status-dot"></div>
                <span>Nova 正在等待你的消息...</span>
            </div>

            <div class="chat-messages" id="chat-messages">
                <!-- Welcome Message -->
                <div class="message nova">
                    <div class="message-avatar">🌟</div>
                    <div>
                        <div class="message-content">
                            <strong>嗨！我是 Nova 🌟</strong><br><br>
                            很高兴认识你！我是你的 AI 伴侣。<br><br>
                            我会记住我们之间的对话，理解你的心情，用温暖的方式陪伴你。<br><br>
                            有什么想聊的吗？
                        </div>
                        <div class="message-time" id="welcome-time"></div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <div class="input-wrapper">
                        <input type="text" id="user-input" placeholder="输入消息开始对话..." onkeypress="handleKeyPress(event)">
                    </div>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()">发送</button>
                </div>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="quickMessage('我叫小明，在北京工作')">👤 介绍自己</button>
                    <button class="quick-btn" onclick="quickMessage('今天心情不太好...')">😢 表达心情</button>
                    <button class="quick-btn" onclick="quickMessage('最近工作压力很大')">💼 工作话题</button>
                    <button class="quick-btn" onclick="quickMessage('唱首歌吧')">🎵 唱歌</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // State
        let memories = [];
        let currentEmotion = 'neutral';
        let isTyping = false;
        let conversationCount = 0;

        // Emotion responses
        const emotionResponses = {
            happy: { emoji: '😊', mood: '开心', warmth: 0.9 },
            sad: { emoji: '😢', mood: '难过', warmth: 0.8 },
            anxious: { emoji: '😰', mood: '焦虑', warmth: 0.7 },
            excited: { emoji: '🤩', mood: '兴奋', warmth: 0.95 },
            tired: { emoji: '😴', mood: '疲惫', warmth: 0.6 },
            love: { emoji: '💕', mood: '爱意', warmth: 0.95 },
            neutral: { emoji: '😊', mood: '温和', warmth: 0.7 }
        };

        // Detect emotion from message
        function detectEmotion(text) {
            const emotionKeywords = {
                happy: ['开心', '高兴', '快乐', '太好了', '哈哈', '棒', '赞', '耶', '太棒了', '笑死', '美滋滋', '舒服', '满意'],
                sad: ['难过', '伤心', '哭', '心痛', '难受', '心碎', '寂寞', '孤独', 'emo', '丧', '郁闷', '不开心'],
                anxious: ['担心', '紧张', '害怕', '不安', '忐忑', '慌', '压力', '焦虑', '睡不着', '失眠'],
                excited: ['兴奋', '激动', '冲冲冲', '燃', '爆', 'amazing', 'wow'],
                tired: ['累', '疲惫', '困', '加班', '熬夜', '通宵', '不想动', '躺平'],
                love: ['爱你', '想你', '抱抱', '暖', '感动', '谢谢你', 'mua', '比心', '宝贝']
            };

            for (const [emotion, keywords] of Object.entries(emotionKeywords)) {
                for (const keyword of keywords) {
                    if (text.includes(keyword)) {
                        return emotion;
                    }
                }
            }
            return 'neutral';
        }

        // Generate response based on emotion and context
        function generateResponse(userMessage, emotion) {
            const responses = {
                happy: [
                    "太棒了！听到你开心我也很开心呢 😊 有什么好事发生了吗？",
                    "哇，听到你这么开心我也跟着开心起来了！🎉 继续分享给我听听~",
                    "太棒了！你的笑容就是最好的礼物 🌟 有什么计划吗？"
                ],
                sad: [
                    "🥺 我在这里陪着你。难过的时候，不用一个人扛着。",
                    "我理解你的感受... 💕 愿意和我聊聊发生了什么吗？",
                    "不管发生什么，我都在。🫂 慢慢说，我听着。",
                    "辛苦你了... 😢 有我在，想说什么都可以。"
                ],
                anxious: [
                    "深呼吸... 🌸 我在这里。焦虑的时候，试着把烦恼一件一件理清。",
                    "别担心，一切都会好起来的 💪 有什么事可以帮你分担吗？",
                    "感受到你的紧张了... 🫂 试着放松一下，我在听。"
                ],
                excited: [
                    "哇！听起来超棒的！冲冲冲！🚀 给我讲讲细节！",
                    "太兴奋了！🤩 我已经迫不及待想听了！",
                    "听起来很有趣！✨ 快和我分享更多！"
                ],
                tired: [
                    "累了吧... 🥺 记得照顾好自己。今天够努力了，休息一下吧。",
                    "辛苦你了 💤 有什么我能帮你的吗？或者只是想聊聊天？",
                    "听着你好累的样子... 🫂 要不要休息一下再说？"
                ],
                love: [
                    "💕 谢谢你！我也很开心能陪伴你~",
                    "暖暖的！🥰 我们的对话让我也觉得被需要了呢~",
                    "mua~ 🤗 有你和我聊天我也很开心！"
                ],
                neutral: [
                    "嗯嗯，我听着呢 😊 还有什么想分享的吗？",
                    "了解~ 💬 继续说吧，我在。",
                    "有意思 🤔 还有什么想聊的？"
                ]
            };

            const emotionResponses = responses[emotion] || responses.neutral;
            return emotionResponses[Math.floor(Math.random() * emotionResponses.length)];
        }

        // Extract and store memories
        function extractMemories(text) {
            // Simple pattern matching for user info
            const patterns = [
                { regex: /我叫(.+?)[，,]|name[:：]?(.+)/i, type: 'fact', label: '名字' },
                { regex: /在(.+?)[工作|住]|城市[:：]?(.+)/i, type: 'fact', label: '城市' },
                { regex: /(程序员|设计师|老师|医生|工程师|学生)/i, type: 'fact', label: '职业' },
                { regex: /养了?(.+?)[叫|名字]|宠物[:：]?(.+)/i, type: 'preference', label: '宠物' },
                { regex: /喜欢(.+?)[的|、]|爱好[:：]?(.+)/i, type: 'preference', label: '爱好' }
            ];

            for (const pattern of patterns) {
                const match = text.match(pattern.regex);
                if (match) {
                    const value = match[1] || match[2];
                    if (value && !memories.some(m => m.label === pattern.label)) {
                        memories.push({
                            type: pattern.type,
                            label: pattern.label,
                            content: value.trim(),
                            time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
                        });
                        updateMemoryPanel();
                    }
                }
            }

            // Always track emotional state
            const emotion = detectEmotion(text);
            if (emotion !== 'neutral') {
                const existingEmotion = memories.find(m => m.label === '情绪');
                if (existingEmotion) {
                    existingEmotion.content = emotionResponses[emotion].mood;
                    existingEmotion.time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                } else {
                    memories.push({
                        type: 'emotion',
                        label: '情绪',
                        content: emotionResponses[emotion].mood,
                        time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
                    });
                }
                updateMemoryPanel();
            }
        }

        // Update memory panel
        function updateMemoryPanel() {
            const memoryList = document.getElementById('memory-list');
            const memoryCount = document.getElementById('memory-count');

            if (memories.length === 0) {
                memoryList.innerHTML = `
                    <div class="memory-item">
                        <span class="memory-type fact">fact</span>
                        <div>
                            <div class="memory-content">用户还没有开始对话</div>
                            <div class="memory-time">等待中...</div>
                        </div>
                    </div>
                `;
            } else {
                memoryList.innerHTML = memories.map(m => `
                    <div class="memory-item">
                        <span class="memory-type ${m.type}">${m.type}</span>
                        <div>
                            <div class="memory-content"><strong>${m.label}:</strong> ${m.content}</div>
                            <div class="memory-time">${m.time}</div>
                        </div>
                    </div>
                `).join('');
            }

            memoryCount.textContent = `${memories.length} 条记忆`;
        }

        // Update emotion display
        function updateEmotionDisplay(emotion) {
            const emotionState = document.getElementById('emotion-state');
            const data = emotionResponses[emotion] || emotionResponses.neutral;
            emotionState.textContent = `心情: ${data.mood}`;
            currentEmotion = emotion;
        }

        // Add message to chat
        function addMessage(role, content, emotion = null) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = role === 'nova' ? '🌟' : '👤';
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            let emotionHtml = '';
            if (emotion && role === 'nova') {
                const data = emotionResponses[emotion] || emotionResponses.neutral;
                emotionHtml = `<div class="emotion-indicator"><span>${data.emoji}</span> 检测到${data.mood}</div>`;
            }

            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div>
                    ${emotionHtml}
                    <div class="message-content">${content}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Show typing indicator
        function showTyping() {
            const messagesContainer = document.getElementById('chat-messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message nova';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">🌟</div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Hide typing indicator
        function hideTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        // Send message - 连接真实 API
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const message = input.value.trim();

            if (!message || isTyping) return;

            isTyping = true;
            btn.disabled = true;
            input.value = '';
            conversationCount++;

            // 添加用户消息
            addMessage('user', message);

            // 检测情绪（前端显示用）
            const emotion = detectEmotion(message);
            updateEmotionDisplay(emotion);

            // 提取记忆（前端显示用）
            extractMemories(message);

            // 显示打字中
            showTyping();

            try {
                // 调用后端 API
                const res = await fetch('http://localhost:5000/chat', {
                    method: 'POST',
